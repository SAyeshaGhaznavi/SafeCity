<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCity – Case Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0a0f1e;--cyan:#00c8ff;--white:#f0f4ff;--muted:#7a8db0;--red:#ff4e6a;--yellow:#ffb830;--green:#00e5a0;--border:rgba(0,200,255,0.15);--card:rgba(255,255,255,0.04)}
    html,body{height:100vh;width:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;overflow:hidden;margin:0;padding:0;color:var(--white)}
    .phone-frame{width:380px;height:92vh;background:var(--navy);border:12px solid #111;border-radius:40px;overflow:hidden;box-shadow:0 0 80px rgba(0,200,255,0.2),0 0 0 1px rgba(0,200,255,0.08);display:flex;flex-direction:column;position:relative;background-image:linear-gradient(rgba(0,200,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.025) 1px,transparent 1px);background-size:50px 50px}
    .phone-frame::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:28px;background:#111;border-radius:0 0 20px 20px;z-index:100}
    .phone-frame::after{content:'9:41  ▲  🔋';position:absolute;top:5px;left:0;right:0;text-align:center;font-size:0.62rem;color:rgba(240,244,255,0.6);z-index:101;font-weight:600;letter-spacing:1.5px}
    .phone-content{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:rgba(0,200,255,0.2) transparent}
    .phone-content::-webkit-scrollbar{width:3px}
    .phone-content::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.3);border-radius:2px}

    .header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(10,15,30,0.92)}
    .back-btn{background:none;border:none;color:var(--cyan);font-size:1.2rem;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all 0.2s}
    .back-btn:hover{background:rgba(0,200,255,0.1)}
    .header-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;flex:1}

    .content{flex:1;padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
    .content::-webkit-scrollbar{width:3px}
    .content::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.3);border-radius:2px}

    .filter-tabs{display:flex;gap:7px;flex-wrap:wrap}
    .filter-tab{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:700;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px;font-family:'DM Sans',sans-serif}
    .filter-tab.active{background:rgba(0,200,255,0.15);border-color:var(--cyan);color:var(--cyan)}
    .filter-tab:hover{border-color:var(--cyan)}

    .case-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;transition:all 0.2s;display:flex;flex-direction:column;gap:10px}
    .case-card:hover{border-color:rgba(0,200,255,0.3)}
    .case-top{display:flex;justify-content:space-between;align-items:flex-start}
    .case-num{font-weight:700;font-size:0.72rem;color:var(--cyan);margin-bottom:3px}
    .case-type{font-weight:700;font-size:0.88rem;display:flex;align-items:center;gap:6px}
    .case-status{font-size:0.62rem;font-weight:700;padding:4px 8px;border-radius:5px;text-transform:uppercase;flex-shrink:0}
    .cs-pending{background:rgba(255,184,48,0.2);color:var(--yellow)}
    .cs-progress{background:rgba(0,200,255,0.2);color:var(--cyan)}
    .cs-resolved{background:rgba(0,229,160,0.15);color:var(--green)}
    .case-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.72rem}
    .meta-label{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--cyan);font-weight:700;margin-bottom:2px}
    .pr-high{color:var(--red);font-weight:700}
    .pr-med{color:var(--yellow);font-weight:700}
    .pr-low{color:var(--green);font-weight:700}
    .case-loc{font-size:0.7rem;color:var(--muted);padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:5px}
    .view-btn{width:100%;padding:8px;background:rgba(0,200,255,0.08);border:1px solid rgba(0,200,255,0.2);color:var(--cyan);border-radius:7px;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;text-align:center;text-decoration:none;display:block}
    .view-btn:hover{background:rgba(0,200,255,0.15)}
    .empty-state{text-align:center;padding:30px 10px;font-size:0.78rem;color:var(--muted)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">←</button>
      <div class="header-title">CASE TRACKING</div>
    </div>

    <div class="phone-content">
      <div class="content">
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterCases(this,'all')">All</button>
          <button class="filter-tab" onclick="filterCases(this,'Pending')">Pending</button>
          <button class="filter-tab" onclick="filterCases(this,'In Progress')">In Progress</button>
          <button class="filter-tab" onclick="filterCases(this,'Resolved')">Resolved</button>
        </div>

        <div id="caseList">
          {% for c in cases %}
          <div class="case-card" data-status="{{ c.status }}">
            <div class="case-top">
              <div>
                <div class="case-num">#{{ c.complaint_id }}</div>
                <div class="case-type">{{ c.category_name }}</div>
              </div>
              <span class="case-status {% if c.status == 'Pending' %}cs-pending{% elif c.status == 'In Progress' %}cs-progress{% else %}cs-resolved{% endif %}">{{ c.status }}</span>
            </div>
            <div class="case-meta">
              <div><div class="meta-label">Time</div><div>{{ c.time_ago }}</div></div>
              <div><div class="meta-label">Priority</div><div class="{% if c.priority == 'High' %}pr-high{% elif c.priority == 'Medium' %}pr-med{% else %}pr-low{% endif %}">{{ c.priority if c.priority else 'Medium' }}</div></div>
            </div>
            <div class="case-loc">📍 {{ c.location }}</div>
            <a href="/case_detail/{{ c.complaint_id }}" class="view-btn">View Details →</a>
          </div>
          {% else %}
          <div class="empty-state">No cases found</div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
  <script>
    function filterCases(btn,status){
      document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.case-card').forEach(c=>{
        c.style.display=(status==='all'||c.dataset.status===status)?'flex':'none';
      });
    }
  </script>
</body>
</html>
