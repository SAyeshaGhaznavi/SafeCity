<!DOCTYPE html>
<html>
<head>
    <title>Report Portal</title>
</head>
<body style="font-family: Arial; text-align:center;">
    <h1>Report Portal</h1>

    <div style="width:300px; margin:auto; padding:20px; border:1px solid #ccc; border-radius:10px;">
        <h3>Citizen Quick Access</h3>
        <p>Use your full name and 13-digit CNIC number to securely submit a report.</p>

        <input type="text" placeholder="Full Name" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" placeholder="CNIC Number (e.g. 12345-6789123-1)" style="width:100%; margin-bottom:10px; padding:8px;">

        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <label><input type="checkbox"> Report Anonymously</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button style="margin-top:15px; width:100%;">Report Incident Now</button>

        <p style="margin-top:10px;">-- Or Quick Report --</p>

        <button style="width:100%; margin-bottom:5px;">Report as Guest (anonymous)</button>
        <button style="width:100%;">Quick Call Hotline</button>
    </div>
</body>
</html>
