<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCity – Report Incident</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0a0f1e;--cyan:#00c8ff;--white:#f0f4ff;--muted:#7a8db0;--red:#ff4e6a;--green:#00e5a0;--border:rgba(0,200,255,0.15)}
    html,body{height:100vh;width:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;overflow:hidden;margin:0;padding:0;color:var(--white)}
    .phone-frame{width:380px;height:92vh;background:var(--navy);border:12px solid #111;border-radius:40px;overflow:hidden;box-shadow:0 0 80px rgba(0,200,255,0.2),0 0 0 1px rgba(0,200,255,0.08);display:flex;flex-direction:column;position:relative;background-image:linear-gradient(rgba(0,200,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.025) 1px,transparent 1px);background-size:50px 50px}
    .phone-frame::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:28px;background:#111;border-radius:0 0 20px 20px;z-index:100}
    .phone-frame::after{content:'9:41  ▲  🔋';position:absolute;top:5px;left:0;right:0;text-align:center;font-size:0.62rem;color:rgba(240,244,255,0.6);z-index:101;font-weight:600;letter-spacing:1.5px}
    .phone-content{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;scrollbar-width:thin}
    .phone-content::-webkit-scrollbar{width:3px}
    .phone-content::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.3);border-radius:2px}

    /* HEADER */
    .header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(10,15,30,0.9)}
    .back-btn{background:none;border:none;color:var(--cyan);font-size:1.2rem;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all 0.2s}
    .back-btn:hover{background:rgba(0,200,255,0.1)}
    .header-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;flex:1}

    .content{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px}

    /* CRIME TYPE */
    .section-label{font-size:0.65rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
    .crime-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .crime-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;color:var(--muted)}
    .crime-btn.active,.crime-btn:hover{border-color:var(--cyan);background:rgba(0,200,255,0.08);color:var(--cyan)}
    .crime-btn-icon{font-size:1.3rem}
    .crime-btn-label{font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

    /* FORM */
    .form-group{display:flex;flex-direction:column;gap:6px}
    label{font-size:0.65rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:1.5px}
    input,select,textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:0.85rem;font-family:'DM Sans',sans-serif;transition:all 0.2s;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--cyan);background:rgba(0,200,255,0.07)}
    input::placeholder,textarea::placeholder{color:var(--muted);opacity:0.6}
    select option{background:var(--navy)}
    textarea{resize:none;min-height:70px;line-height:1.5}

    .checkbox-row{display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--muted)}
    input[type="checkbox"]{width:16px;height:16px;accent-color:var(--cyan);flex-shrink:0}

    .upload-area{border:1px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all 0.2s}
    .upload-area:hover{border-color:var(--cyan);background:rgba(0,200,255,0.04)}
    .upload-icon{font-size:1.5rem;margin-bottom:4px}
    .upload-text{font-size:0.72rem;color:var(--muted)}

    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{padding:11px 14px;border:none;border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-danger{background:linear-gradient(135deg,var(--red),#ff2d5e);color:#fff}
    .btn-danger:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,78,106,0.3)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--white)}
    .btn-outline:hover{border-color:var(--muted)}
    .hotline{text-align:center;font-size:0.75rem;color:var(--muted);padding:8px;border-top:1px solid var(--border)}
    .hotline strong{color:var(--cyan)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- HEADER -->
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">←</button>
      <div class="header-title">REPORT CRIME</div>
    </div>

    <div class="phone-content">
      <div class="content">
        <!-- CRIME TYPE -->
        <div>
          <div class="section-label">Crime Type</div>
          <div class="crime-grid">
            <button class="crime-btn active" onclick="selectCrime(this)"><span class="crime-btn-icon">💰</span><span class="crime-btn-label">Theft</span></button>
            <button class="crime-btn" onclick="selectCrime(this)"><span class="crime-btn-icon">👊</span><span class="crime-btn-label">Assault</span></button>
            <button class="crime-btn" onclick="selectCrime(this)"><span class="crime-btn-icon">🚗</span><span class="crime-btn-label">Traffic</span></button>
            <button class="crime-btn" onclick="selectCrime(this)"><span class="crime-btn-icon">🔊</span><span class="crime-btn-label">Noise</span></button>
            <button class="crime-btn" onclick="selectCrime(this)"><span class="crime-btn-icon">🏚️</span><span class="crime-btn-label">Vandalism</span></button>
            <button class="crime-btn" onclick="selectCrime(this)"><span class="crime-btn-icon">•••</span><span class="crime-btn-label">Other</span></button>
          </div>
        </div>

        <!-- FORM -->
        <form method="POST" action="/report">
          <div style="display:flex;flex-direction:column;gap:12px">
            <div class="form-group">
              <label>Description</label>
              <textarea name="description" placeholder="Describe what happened..."></textarea>
            </div>
            <div class="form-group">
              <label>Location</label>
              <input type="text" name="location" placeholder="e.g. Gulberg III, Lahore">
            </div>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" name="full_name" placeholder="Your full name">
            </div>
            <div class="form-group">
              <label>CNIC Number</label>
              <input type="text" name="cnic" placeholder="12345-6789123-1">
            </div>
            <div class="checkbox-row">
              <input type="checkbox" id="anon" name="anonymous">
              <label for="anon" style="font-size:0.8rem;text-transform:none;letter-spacing:0;color:var(--muted);font-weight:400">Report Anonymously</label>
            </div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
              <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
              <div class="upload-icon">📎</div>
              <div class="upload-text">Tap to upload evidence (Images/Video)</div>
            </div>
            <div class="btn-row">
              <button type="submit" class="btn btn-danger">🚨 Submit Report</button>
              <a href="/portal" class="btn btn-outline">Cancel</a>
            </div>
          </div>
        </form>
        <div class="hotline">📞 Hotline: <strong>1800-SAFE</strong> · Available 24/7</div>
      </div>
    </div>
  </div>
  <script>
    function selectCrime(btn){document.querySelectorAll('.crime-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
  </script>
</body>
</html>
