<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SafeCity – Citizen Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0a0f1e;
      --cyan:#00c8ff;
      --white:#f0f4ff;
      --muted:#7a8db0;
      --red:#ff4e6a;
      --green:#00e5a0;
      --border:rgba(0,200,255,0.15);
      --card:rgba(255,255,255,0.04);
    }
    
    html, body {
      height: 100vh;
      width: 100vw;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 0;
      color: var(--white);
      overflow: hidden;
    }
    
    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    
    /* FULL SCREEN CONTAINER */
    .app-container {
      width: 100vw;
      height: 100vh;
      background: var(--navy);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      background-image: 
        linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    
    /* Remove phone-specific elements */
    .app-container::before,
    .app-container::after {
      display: none;
    }
    
    /* MAIN CONTENT AREA */
    .app-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,200,255,0.2) transparent;
    }
    
    .app-content::-webkit-scrollbar {
      width: 6px;
    }
    
    .app-content::-webkit-scrollbar-thumb {
      background: rgba(0,200,255,0.3);
      border-radius: 3px;
    }
    
    /* HEADER - responsive */
    .header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: rgba(10,15,30,0.95);
      backdrop-filter: blur(10px);
    }
    
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 4px;
    }
    
    .logo span {
      color: var(--cyan);
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .user-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(0,200,255,0.15);
      border: 2px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--cyan);
      font-size: 1rem;
    }
    
    /* CONTENT - fills available space */
    .content {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }
    
    .welcome-section {
      margin-bottom: 8px;
    }
    
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 3px;
      line-height: 1.2;
    }
    
    .page-sub {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 4px;
    }
    
    /* ACTION CARDS - responsive grid */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin: 16px 0;
    }
    
    .action-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      text-decoration: none;
      color: var(--white);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
      min-width: 0;
    }
    
    .action-card:hover {
      border-color: var(--cyan);
      background: rgba(0,200,255,0.07);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,200,255,0.15);
    }
    
    .action-card.primary {
      background: rgba(0,200,255,0.08);
      border-color: rgba(0,200,255,0.3);
    }
    
    .action-card.danger-card {
      background: rgba(255,78,106,0.08);
      border-color: rgba(255,78,106,0.3);
    }
    
    .ac-icon {
      font-size: 2.5rem;
    }
    
    .ac-title {
      font-size: 1.2rem;
      font-weight: 700;
    }
    
    .ac-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }
    
    /* SECTION HEADERS */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
    }
    
    /* EMERGENCY CONTACTS - responsive */
    .contacts-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-top: 8px;
    }
    
    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 24px;
    }
    
    .contact-item {
      background: rgba(0,200,255,0.05);
      border: 1px solid rgba(0,200,255,0.1);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      transition: all 0.2s ease;
    }
    
    .contact-item:hover {
      background: rgba(0,200,255,0.1);
      border-color: var(--cyan);
      transform: scale(1.02);
    }
    
    .contact-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--cyan);
      letter-spacing: 2px;
    }
    
    .contact-lbl {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    
    /* RESPONSIVE BREAKPOINTS */
    @media (max-width: 1024px) {
      .content {
        padding: 32px 24px;
      }
      
      .page-title {
        font-size: 2.5rem;
      }
      
      .action-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
      
      .contacts-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .contact-num {
        font-size: 2.2rem;
      }
    }
    
    @media (max-width: 768px) {
      .header {
        padding: 16px 24px;
      }
      
      .logo {
        font-size: 1.4rem;
      }
      
      .user-avatar {
        width: 40px;
        height: 40px;
        font-size: 0.9rem;
      }
      
      .content {
        padding: 24px 20px;
        gap: 20px;
      }
      
      .page-title {
        font-size: 2rem;
      }
      
      .page-sub {
        font-size: 0.9rem;
      }
      
      .action-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      
      .action-card {
        padding: 24px 20px;
      }
      
      .ac-icon {
        font-size: 2rem;
      }
      
      .ac-title {
        font-size: 1.1rem;
      }
      
      .section-title {
        font-size: 1.4rem;
      }
      
      .contacts-card {
        padding: 24px 20px;
      }
      
      .contacts-grid {
        gap: 16px;
      }
      
      .contact-item {
        padding: 20px;
      }
      
      .contact-num {
        font-size: 1.8rem;
      }
    }
    
    @media (max-width: 480px) {
      .header {
        padding: 14px 16px;
      }
      
      .logo {
        font-size: 1.2rem;
        letter-spacing: 3px;
      }
      
      .content {
        padding: 20px 16px;
      }
      
      .page-title {
        font-size: 1.8rem;
      }
      
      .contacts-grid {
        grid-template-columns: 1fr;
      }
      
      .contact-item {
        padding: 18px;
      }
    }
    
    /* Button reset for SOS */
    button.action-card {
      width: 100%;
      border: none;
      font-family: inherit;
      text-align: left;
    }
    
    button.action-card:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- HEADER -->
    <div class="header">
      <div class="logo">SAFE<span>CITY</span></div>
      <div class="header-right">
        <div class="user-avatar">JD</div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="app-content">
      <div class="content">
        <div class="welcome-section">
          <div class="page-title">Welcome Back</div>
          <div class="page-sub">Stay informed. Report incidents. Stay safe.</div>
        </div>

        <!-- ACTIONS -->
        <div class="action-grid">
          <a href="/report" class="action-card primary">
            <div class="ac-icon">🚨</div>
            <div class="ac-title">Report Crime</div>
            <div class="ac-desc">File an incident anonymously</div>
          </a>
          <button onclick="alert('Emergency services notified!')" class="action-card danger-card">
            <div class="ac-icon">🆘</div>
            <div class="ac-title">SOS Alert</div>
            <div class="ac-desc">Immediate emergency call</div>
          </button>
          <a href="/citizen_dashboard" class="action-card">
            <div class="ac-icon">📊</div>
            <div class="ac-title">Dashboard</div>
            <div class="ac-desc">Your activity overview</div>
          </a>
        </div>

        <!-- EMERGENCY CONTACTS -->
        <div class="contacts-card">
          <div class="section-head">
            <div class="section-title">Emergency Contacts</div>
          </div>
          <div class="contacts-grid">
            <div class="contact-item">
              <div class="contact-num">15</div>
              <div class="contact-lbl">Police</div>
            </div>
            <div class="contact-item">
              <div class="contact-num">1122</div>
              <div class="contact-lbl">Rescue</div>
            </div>
            <div class="contact-item">
              <div class="contact-num">16</div>
              <div class="contact-lbl">Fire Brigade</div>
            </div>
            <div class="contact-item">
              <div class="contact-num">1915</div>
              <div class="contact-lbl">Traffic Police</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
