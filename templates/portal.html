<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCity – Citizen Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0a0f1e;--cyan:#00c8ff;--white:#f0f4ff;--muted:#7a8db0;--red:#ff4e6a;--green:#00e5a0;--border:rgba(0,200,255,0.15);--card:rgba(255,255,255,0.04)}
    html,body{height:100vh;width:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;overflow:hidden;margin:0;padding:0;color:var(--white)}
    .phone-frame{width:380px;height:92vh;background:var(--navy);border:12px solid #111;border-radius:40px;overflow:hidden;box-shadow:0 0 80px rgba(0,200,255,0.2),0 0 0 1px rgba(0,200,255,0.08);display:flex;flex-direction:column;position:relative;background-image:linear-gradient(rgba(0,200,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.025) 1px,transparent 1px);background-size:50px 50px}
    .phone-frame::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:28px;background:#111;border-radius:0 0 20px 20px;z-index:100}
    .phone-frame::after{content:'9:41  ▲  🔋';position:absolute;top:5px;left:0;right:0;text-align:center;font-size:0.62rem;color:rgba(240,244,255,0.6);z-index:101;font-weight:600;letter-spacing:1.5px}
    .phone-content{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:rgba(0,200,255,0.2) transparent}
    .phone-content::-webkit-scrollbar{width:3px}
    .phone-content::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.3);border-radius:2px}

    /* HEADER */
    .header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(10,15,30,0.9)}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px}
    .logo span{color:var(--cyan)}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-avatar{width:30px;height:30px;border-radius:50%;background:rgba(0,200,255,0.15);border:1.5px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--cyan);font-size:0.7rem}

    /* CONTENT */
    .content{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px}
    .page-sub{font-size:0.75rem;color:var(--muted);margin-top:2px}

    /* ACTION CARDS */
    .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .action-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 12px;text-decoration:none;color:var(--white);display:flex;flex-direction:column;gap:8px;transition:all 0.2s;cursor:pointer}
    .action-card:hover{border-color:var(--cyan);background:rgba(0,200,255,0.07);transform:translateY(-2px)}
    .action-card.primary{background:rgba(0,200,255,0.08);border-color:rgba(0,200,255,0.3)}
    .action-card.danger-card{background:rgba(255,78,106,0.08);border-color:rgba(255,78,106,0.3)}
    .ac-icon{font-size:1.5rem}
    .ac-title{font-size:0.8rem;font-weight:700}
    .ac-desc{font-size:0.68rem;color:var(--muted);line-height:1.4}

    /* SECTION */
    .section-head{display:flex;align-items:center;justify-content:space-between}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1.5px}

    /* EMERGENCY CONTACTS */
    .contacts-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
    .contacts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .contact-item{background:rgba(0,200,255,0.05);border:1px solid rgba(0,200,255,0.1);border-radius:8px;padding:10px;text-align:center}
    .contact-num{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--cyan)}
    .contact-lbl{font-size:0.62rem;color:var(--muted);margin-top:2px}
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- HEADER -->
    <div class="header">
      <div class="logo">SAFE<span>CITY</span></div>
      <div class="header-right">
        <div class="user-avatar">JD</div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="phone-content">
      <div class="content">
        <div>
          <div class="page-title">Welcome Back</div>
          <div class="page-sub">Stay informed. Report incidents. Stay safe.</div>
        </div>

        <!-- ACTIONS -->
        <div class="action-grid">
          <a href="/report" class="action-card primary">
            <div class="ac-icon">🚨</div>
            <div class="ac-title">Report Crime</div>
            <div class="ac-desc">File an incident anonymously</div>
          </a>
          <button onclick="alert('Emergency services notified!')" class="action-card danger-card">
            <div class="ac-icon">🆘</div>
            <div class="ac-title">SOS Alert</div>
            <div class="ac-desc">Immediate emergency call</div>
          </button>
          <a href="/citizen_dashboard" class="action-card">
            <div class="ac-icon">📊</div>
            <div class="ac-title">Dashboard</div>
            <div class="ac-desc">Your activity overview</div>
          </a>
        </div>

        <!-- EMERGENCY CONTACTS -->
        <div class="contacts-card">
          <div class="section-head">
            <div class="section-title">Emergency Contacts</div>
          </div>
          <div class="contacts-grid">
            <div class="contact-item"><div class="contact-num">15</div><div class="contact-lbl">Police</div></div>
            <div class="contact-item"><div class="contact-num">1122</div><div class="contact-lbl">Rescue</div></div>
            <div class="contact-item"><div class="contact-num">16</div><div class="contact-lbl">Fire Brigade</div></div>
            <div class="contact-item"><div class="contact-num">1915</div><div class="contact-lbl">Traffic Police</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
