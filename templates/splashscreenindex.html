<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCity</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #0a0f1e;
      --cyan: #00c8ff;
      --white: #f0f4ff;
      --muted: #7a8db0;
      --border: rgba(0,200,255,0.15);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
    }

    .page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background-color: var(--navy);
      background-image:
        linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 55% 55% at 50% 50%,
        rgba(0,200,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* CLICKABLE WRAPPER */
    .oval-card-link {
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .oval-card {
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      border-radius: 50% / 40%;
      width: 320px;
      height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(0,200,255,0.1);
      transition: 0.25s ease;
      cursor: pointer;
    }

    .oval-card:hover {
      transform: scale(1.03);
      box-shadow:
        0 40px 100px rgba(0,0,0,0.7),
        0 0 25px rgba(0,200,255,0.25);
    }

    .shield-svg {
      width: 98px;
      height: 98px;
      margin-bottom: 16px;
    }

    .app-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      letter-spacing: 8px;
      color: var(--white);
      margin-bottom: 6px;
    }

    .app-name span {
      color: var(--cyan);
    }

    .app-tagline {
      font-size: 0.58rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .bottom {
      position: absolute;
      bottom: 30px;
      text-align: center;
      width: 100%;
    }

    .bottom-text {
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      color: var(--muted);
      opacity: 0.4;
    }
  </style>
</head>

<body>

  <div class="page">

    <!-- CLICK ANYWHERE ON CARD -->
    <a href="/splash" class="oval-card-link">

      <div class="oval-card">

        <svg class="shield-svg" viewBox="0 0 100 110" fill="none">
          <path d="M50 6L10 22V50C10 72 28 90 50 98C72 90 90 72 90 50V22L50 6Z" fill="#1a4fa0"/>
          <path d="M50 18L22 30V50C22 67 34 81 50 88C66 81 78 67 78 50V30L50 18Z" fill="#00c8ff" opacity="0.3"/>
        </svg>

        <div class="app-name">SAFE<span>CITY</span></div>
        <div class="app-tagline">Pakistan's Safety Platform</div>

      </div>

    </a>

    <div class="bottom">
      <div class="bottom-text">Lahore · Pakistan</div>
    </div>

  </div>

</body>
</html>
