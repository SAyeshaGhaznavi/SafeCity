<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCity</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a0f1e;
      --cyan: #00c8ff;
      --white: #f0f4ff;
      --muted: #7a8db0;
      --border: rgba(0,200,255,0.15);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
    }

    /* Navy grid background — matches portal exactly */
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--navy);
      background-image:
        linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Subtle center glow */
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 55% 55% at 50% 50%,
        rgba(0,200,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── OVAL CARD ── */
    .oval-card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      border-radius: 50% / 40%;
      width: 320px;
      height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(0,200,255,0.07),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(0,200,255,0.1);
      animation: floatIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: scale(0.9) translateY(24px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Pulse rings */
    .pulse-ring {
      position: absolute;
      width: 344px; height: 384px;
      border-radius: 50% / 40%;
      border: 1px solid rgba(0,200,255,0.1);
      animation: pulse 3s ease-out infinite;
      pointer-events: none;
    }
    .pulse-ring-2 { animation-delay: 1.5s; }

    @keyframes pulse {
      0%   { transform: scale(0.97); opacity: 0.6; }
      100% { transform: scale(1.14); opacity: 0; }
    }

    /* ── SHIELD SVG ── */
    .shield-svg {
      width: 98px; height: 98px;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 18px rgba(0,200,255,0.35));
    }

    /* ── TEXT ── */
    .app-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      letter-spacing: 8px;
      color: var(--white);
      line-height: 1;
      margin-bottom: 6px;
    }
    .app-name span { color: var(--cyan); }

    .app-tagline {
      font-size: 0.58rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── ENTER LINK ── */
    .enter-link {
      margin-top: 26px;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      text-decoration: none;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    .enter-link:hover { opacity: 1; }

    /* ── BOTTOM ── */
    .bottom {
      position: absolute;
      bottom: 30px;
      left: 0; right: 0;
      z-index: 2;
      text-align: center;
      animation: floatIn 1s 0.5s both;
    }
    .bottom-text {
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="oval-card">
      <div class="pulse-ring"></div>
      <div class="pulse-ring pulse-ring-2"></div>

      <svg class="shield-svg" viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 6L10 22V50C10 72 28 90 50 98C72 90 90 72 90 50V22L50 6Z" fill="url(#sg1)"/>
        <path d="M50 18L22 30V50C22 67 34 81 50 88C66 81 78 67 78 50V30L50 18Z" fill="url(#sg2)" opacity="0.4"/>
        <!-- Laurel leaves -->
        <path d="M28 54 Q24 50 26 44 Q30 48 28 54Z" fill="#c8a84b" opacity="0.9"/>
        <path d="M28 60 Q22 57 23 51 Q28 54 28 60Z" fill="#c8a84b" opacity="0.9"/>
        <path d="M30 66 Q24 65 26 58 Q31 61 30 66Z" fill="#c8a84b" opacity="0.8"/>
        <path d="M72 54 Q76 50 74 44 Q70 48 72 54Z" fill="#c8a84b" opacity="0.9"/>
        <path d="M72 60 Q78 57 77 51 Q72 54 72 60Z" fill="#c8a84b" opacity="0.9"/>
        <path d="M70 66 Q76 65 74 58 Q69 61 70 66Z" fill="#c8a84b" opacity="0.8"/>
        <!-- Badge circle -->
        <circle cx="50" cy="50" r="20" fill="rgba(0,200,255,0.08)"/>
        <circle cx="50" cy="50" r="17" fill="none" stroke="rgba(0,200,255,0.3)" stroke-width="1"/>
        <!-- Star -->
        <path d="M50 33 L51.5 38 L56.5 38 L52.5 41 L54 46 L50 43 L46 46 L47.5 41 L43.5 38 L48.5 38 Z" fill="#c8a84b"/>
        <!-- Checkmark in cyan -->
        <path d="M43 51L48 57L58 45" stroke="#00c8ff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="sg1" x1="10" y1="6" x2="90" y2="98" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1a4fa0"/>
            <stop offset="100%" stop-color="#071a50"/>
          </linearGradient>
          <linearGradient id="sg2" x1="22" y1="18" x2="78" y2="88" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#1a4fa0" stop-opacity="0.05"/>
          </linearGradient>
        </defs>
      </svg>

      <div class="app-name">SAFE<span>CITY</span></div>
      <div class="app-tagline">Pakistan's Safety Platform</div>
      <a href="/portal" class="enter-link">Enter →</a>
    </div>

    <div class="bottom">
      <div class="bottom-text">FAST-NUCES · Lahore · Pakistan</div>
    </div>

  </div>
</body>
</html>
